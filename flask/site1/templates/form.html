{% extends "base.html" %}

{% block content %}

    <form action="/form" method="post">
        <input type="text" id="name" name="myname" required>
        <button type="submit">Submit</button>
    </form>

    <ul>
        {% for name in names %}
            <li>{{ name }}</li>
        {% endfor %}
    </ul>
    
{% endblock %}

<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Album{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-md navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-camera me-2"></i>Album</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link {% if active=='home' %}active{% endif %}" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if active=='gallery' %}active{% endif %}" href="/gallery">Gallery</a></li>
          <li class="nav-item"><a class="nav-link {% if active=='add' %}active{% endif %}" href="/add">Add</a></li>
          <li class="nav-item"><a class="nav-link {% if active=='about' %}active{% endif %}" href="/about">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container mt-3">
          {% for category, message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <footer class="bg-dark border-top border-secondary mt-5 py-4">
    <div class="container d-flex justify-content-between align-items-center">
      <small class="text-secondary">Album &copy; 2024</small>
      <a href="#" class="text-secondary small text-decoration-none">Back to top</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

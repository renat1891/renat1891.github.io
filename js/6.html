
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хрестики-нулики</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">

        <div class="players">
            <div class="player-block">
                <div class="player-label">Player 1</div>
                <div class="player-avatar">
                    <img id="avatar-1" src="" alt="">
                </div>
                <select id="select-1" onchange="changeAvatar(1)">
                    <option value="rabbit">Кролик</option>
                    <option value="carrot">Морква</option>
                    <option value="dog">Собака</option>
                    <option value="meat">М'ясо</option>
                </select>
            </div>

            <div class="player-block">
                <div class="player-label">Player 2</div>
                <div class="player-avatar">
                    <img id="avatar-2" src="" alt="">
                </div>
                <select id="select-2" onchange="changeAvatar(2)">
                    <option value="carrot">Морква</option>
                    <option value="rabbit">Кролик</option>
                    <option value="meat">М'ясо</option>
                    <option value="dog">Собака</option>
                </select>
            </div>
        </div>

        <div id="app-wrap">
            <div id="turn-info">
                Player 1: <span id="turn-p1-name"></span> | Player 2: <span id="turn-p2-name"></span>
            </div>
            <div id="app">
                <button onclick="clicked(1)" id="1"><img class="cell-img"></button>
                <button onclick="clicked(2)" id="2"><img class="cell-img"></button>
                <button onclick="clicked(3)" id="3"><img class="cell-img"></button>
                <button onclick="clicked(4)" id="4"><img class="cell-img"></button>
                <button onclick="clicked(5)" id="5"><img class="cell-img"></button>
                <button onclick="clicked(6)" id="6"><img class="cell-img"></button>
                <button onclick="clicked(7)" id="7"><img class="cell-img"></button>
                <button onclick="clicked(8)" id="8"><img class="cell-img"></button>
                <button onclick="clicked(9)" id="9"><img class="cell-img"></button>
            </div>
            <div class="reset">
                <button onclick="reset()">RESET</button>
            </div>
        </div>

        <div class="score">
            <div>Player 1: <span id="score_p1">0</span></div>
            <div>Player 2: <span id="score_p2">0</span></div>
            <div class="score_draw">Draw: <span id="score_draw">0</span></div>
        </div>

    </div>

    <script src="3.js"></script>
</body>

</html>
